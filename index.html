<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Phone Analysis Engine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.4;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f6f7;
        }
        header {
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 24px;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 25%;
            padding: 10px;
            font-size: 16px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }
        button:hover {
            background-color: #34495e;
        }
        .result-box {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: none;
        }
        .result-item {
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }
        .label {
            font-weight: bold;
            color: #2c3e50;
        }
        .error {
            color: #c0392b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Offline Local Phone Analyzer</h1>
        <div class="subtitle">Regex & Prefix Intelligence Script (No APIs Required)</div>
    </header>

    <main>
        <div class="search-box">
            <input type="text" id="phoneInput" placeholder="Enter number (e.g., +923001234567)">
            <button onclick="analyzeNumber()">Analyze</button>
        </div>

        <div id="resultBox" class="result-box">
            <h3>Analysis Results</h3>
            <div id="resultsContent"></div>
        </div>
    </main>

    <script>
        // Custom offline database matching dial codes to country info
        const countryDatabase = {
            "92": { country: "Pakistan", length: 11, regex: /^923\d{9}$/ },
            "1": { country: "United States / Canada", length: 10, regex: /^1\d{10}$/ },
            "44": { country: "United Kingdom", length: 10, regex: /^447\d{9}$/ },
            "91": { country: "India", length: 10, regex: /^91[6-9]\d{9}$/ }
        };

        // Custom offline database matching prefixes to network operators
        const operatorDatabase = {
            "92300": "Jazz (Mobilink)", "92301": "Jazz (Mobilink)", "92302": "Jazz (Mobilink)",
            "92345": "Telenor", "92346": "Telenor",
            "92333": "Ufone", "92334": "Ufone",
            "92312": "Zong", "92313": "Zong"
        };

        function analyzeNumber() {
            const input = document.getElementById('phoneInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            const content = document.getElementById('resultsContent');
            
            if (!input) {
                alert('Please enter a phone number');
                return;
            }

            // Remove formatting symbols to sanitize input string
            const cleanNumber = input.replace(/[\s\-\(\)\+]/g, '');
            resultBox.style.display = 'block';

            if (isNaN(cleanNumber)) {
                content.innerHTML = '<p class="error">Error: Input contains non-numeric characters.</p>';
                return;
            }

            let countryName = "Unknown Country";
            let networkOperator = "Unknown Operator / Network Unlisted";
            let matchedCc = "";

            // Find country match using string parsing loop
            for (let cc in countryDatabase) {
                if (cleanNumber.startsWith(cc)) {
                    matchedCc = cc;
                    countryName = countryDatabase[cc].country;
                    break;
                }
            }

            // Find operator match using prefix search
            for (let prefix in operatorDatabase) {
                if (cleanNumber.startsWith(prefix)) {
                    networkOperator = operatorDatabase[prefix];
                    break;
                }
            }

            // Display locally parsed telemetry data
            content.innerHTML = `
                <div class="result-item"><span class="label">Sanitized String:</span> ${cleanNumber}</div>
                <div class="result-item"><span class="label">Country Origin:</span> ${countryName}</div>
                <div class="result-item"><span class="label">Country Code:</span> +${matchedCc || "N/A"}</div>
                <div class="result-item"><span class="label">Detected Carrier:</span> ${networkOperator}</div>
                <div class="result-item"><span class="label">Structure Validity:</span> Checked against localized definitions</div>
            `;
        }
    </script>

</body>
</html>
